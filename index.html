<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SK Products - Data Entry & Alter</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d; --surface: #161616; --surface2: #1f1f1f; --border: #2a2a2a;
    --gold: #c9a84c; --text: #f0ede8; --text-muted: #888;
    --success: #52b788; --danger: #e05252;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; height: 100vh; overflow-y: auto; }
  
  .page { display: none; padding: 2rem; max-width: 600px; margin: 0 auto; padding-bottom: 100px; }
  .page.active { display: block; animation: slideIn 0.3s ease-out; }
  @keyframes slideIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .login-container { margin-top: 25vh; background: var(--surface); padding: 2rem; border-radius: 16px; border: 1px solid var(--border); text-align: center; }
  
  .field { margin-bottom: 1.2rem; text-align: left; }
  .field label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.5rem; text-transform: uppercase; font-weight: bold; }
  .field input[type="text"], .field input[type="password"], .field input[type="number"] { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 1rem; border-radius: 8px; color: #fff; font-size: 1rem; outline: none; transition: 0.2s; }
  .field input:focus { border-color: var(--gold); }

  .btn-main { width: 100%; background: var(--gold); color: #000; border: none; padding: 1rem; border-radius: 8px; font-weight: 700; font-size: 1.1rem; cursor: pointer; transition: 0.2s; display: flex; justify-content: center; align-items: center; }
  .btn-main:hover { opacity: 0.9; }
  .btn-main:disabled { opacity: 0.5; cursor: wait; }
  
  .btn-outline { background: var(--surface2); color: var(--gold); border: 1px solid var(--gold); }
  .btn-outline:hover { background: rgba(201, 168, 76, 0.1); }

  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; margin-bottom: 1.5rem; position: relative; }
  .card-number { position: absolute; top: -10px; left: -10px; background: var(--gold); color: #000; width: 30px; height: 30px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
  
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  
  .photo-actions { display: flex; gap: 10px; margin-bottom: 10px; }
  .photo-btn { flex: 1; padding: 12px 5px; text-align: center; background: var(--surface2); border: 1px solid var(--gold); border-radius: 8px; color: var(--gold); font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.9rem; }
  .photo-btn:hover { background: var(--gold); color: #000; }
  
  .camera-container { position: relative; width: 100%; border-radius: 8px; overflow: hidden; display: none; background: #000; margin-top: 10px; border: 2px solid var(--gold); }
  .video-preview { width: 100%; aspect-ratio: 3/4; object-fit: cover; display: block; } 
  
  .capture-btn { position: absolute; bottom: 15px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; border: none; padding: 10px 24px; border-radius: 20px; font-weight: bold; font-size: 1rem; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.5); z-index: 10; }
  
  .photo-preview { width: 100%; height: 200px; object-fit: contain; border-radius: 8px; margin-top: 10px; display: none; background: #000; border: 1px solid var(--border); }
  
  .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); padding: 1.5rem; border-top: 1px solid var(--border); display: flex; justify-content: center; z-index: 100; }
  
  .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--gold); color: #000; padding: 1rem 2rem; border-radius: 50px; font-weight: bold; opacity: 0; pointer-events: none; transition: 0.3s; z-index: 3000; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="toast" class="toast"></div>

<div class="page active" id="page-login">
  <div class="login-container">
    <h2 style="color: var(--gold); margin-bottom: 1.5rem;">Inventory Control</h2>
    <div class="field">
      <label>User ID</label>
      <input type="text" id="admin-id" placeholder="Enter User ID">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="admin-pass" placeholder="Enter Password">
    </div>
    <div style="display: flex; gap: 10px; margin-top: 1.5rem;">
      <button class="btn-main" onclick="handleLogin('entry')">New Entry</button>
      <button class="btn-main btn-outline" onclick="handleLogin('alter')">Alter</button>
    </div>
  </div>
</div>

<div class="page" id="page-entry">
  <div style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2 style="color: var(--gold);">New Data Entry</h2>
      <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">Log Out</button>
    </div>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Fill out up to 10 products at once. Leave empty blocks blank.</p>
  </div>

  <div id="forms-container"></div>
</div>

<div class="page" id="page-alter">
  <div style="margin-bottom: 2rem;">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h2 style="color: var(--gold);">Alter Product</h2>
      <button onclick="location.reload()" style="background:none; border:none; color:var(--danger); font-weight:bold; cursor:pointer;">Log Out</button>
    </div>
    <p style="color: var(--text-muted); font-size: 0.9rem; margin-top: 5px;">Type the exact name to update its price.</p>
  </div>

  <div class="product-card">
    <div class="field">
      <label>Exact Tablet/Product Name</label>
      <input type="text" id="alter-name" placeholder="e.g., Dolo 650">
    </div>
    
    <div class="grid-2">
      <div class="field">
        <label>New MRP (₹)</label>
        <input type="number" id="alter-mrp" placeholder="0" oninput="calcAlterPrice()">
      </div>
      <div class="field">
        <label>New Discount (%)</label>
        <input type="number" id="alter-discount" placeholder="0" oninput="calcAlterPrice()">
      </div>
    </div>

    <div class="field">
      <label>New Final Price (₹)</label>
      <input type="number" id="alter-price" placeholder="0">
    </div>

    <button class="btn-main" id="alter-btn" onclick="submitAlter()" style="margin-top: 1.5rem;">Update Pricing</button>
  </div>
</div>


<div class="bottom-bar" id="bottom-bar" style="display: none;">
    <button class="btn-main" id="submit-btn" style="max-width: 600px;" onclick="submitProducts()">Upload Products to Shop</button>
</div>

<script>
// IMPORTANT: PASTE YOUR NEW APPS SCRIPT URL HERE!
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwVlZ0olB8ApFZc2IMcEgsOSBsYiRznoSpV32wAq0rzg61cnLJZJY249a2nKU-gMD5e/exec';

let currentStream = null;

function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 4000); }

// --- LOGIN ROUTING ---
function handleLogin(mode) {
  const id = document.getElementById('admin-id').value;
  const pass = document.getElementById('admin-pass').value;
  
  if (id === 'entry' && pass === '1234') {
    document.getElementById('page-login').classList.remove('active');
    
    if (mode === 'entry') {
        generateForms();
        document.getElementById('page-entry').classList.add('active');
        document.getElementById('bottom-bar').style.display = 'flex';
    } else if (mode === 'alter') {
        document.getElementById('page-alter').classList.add('active');
    }
  } else {
    showToast("Invalid ID or Password");
  }
}

// --- ALTER MODE LOGIC ---
function calcAlterPrice() {
    const mrp = parseFloat(document.getElementById('alter-mrp').value) || 0;
    const discount = parseFloat(document.getElementById('alter-discount').value) || 0;
    const priceField = document.getElementById('alter-price');
    if (mrp > 0) {
        priceField.value = Math.round(mrp - (mrp * (discount / 100)));
    } else {
        priceField.value = "";
    }
}

async function submitAlter() {
  const name = document.getElementById('alter-name').value.trim();
  const mrp = document.getElementById('alter-mrp').value;
  const discount = document.getElementById('alter-discount').value;
  const price = document.getElementById('alter-price').value;

  if (!name || !mrp || !price) return showToast("Please fill in Name, MRP, and Discount!");

  const btn = document.getElementById('alter-btn');
  btn.innerText = "Updating... Please wait.";
  btn.disabled = true;

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: 'updateProduct', name: name, mrp: mrp, discount: discount, price: price })
    });

    const data = await res.json();
    if (data.success) {
      showToast("✅ Product updated successfully!");
      // Clear form
      document.getElementById('alter-name').value = "";
      document.getElementById('alter-mrp').value = "";
      document.getElementById('alter-discount').value = "";
      document.getElementById('alter-price').value = "";
    } else {
      showToast("❌ Error: " + data.error);
    }
  } catch (err) {
    showToast("Network error. Please try again.");
  }
  btn.innerText = "Update Pricing";
  btn.disabled = false;
}

// --- ENTRY MODE LOGIC ---
function generateForms() {
  let html = '';
  for (let i = 1; i <= 10; i++) {
    html += `
      <div class="product-card" id="card-${i}">
        <div class="card-number">${i}</div>
        <div class="field">
          <label>Tablet/Product Name</label>
          <input type="text" id="name-${i}" placeholder="e.g., Dolo 650">
        </div>
        
        <div class="grid-2">
          <div class="field">
            <label>MRP (₹)</label>
            <input type="number" id="mrp-${i}" placeholder="0" oninput="calcPrice(${i})">
          </div>
          <div class="field">
            <label>Discount (%)</label>
            <input type="number" id="discount-${i}" placeholder="0" oninput="calcPrice(${i})">
          </div>
        </div>

        <div class="field">
          <label>Final Price (₹)</label>
          <input type="number" id="price-${i}" placeholder="0">
        </div>

        <div class="field">
          <label>Product Photo</label>
          <div class="photo-actions" id="actions-${i}">
             <label class="photo-btn" for="upload-${i}">📁 Gallery</label>
             <input type="file" id="upload-${i}" accept="image/*" style="display:none;" onchange="handleFileUpload(event, ${i})">
             <button type="button" class="photo-btn" onclick="openCamera(${i})">📸 Camera</button>
          </div>
          
          <div class="camera-container" id="camera-container-${i}">
             <video id="video-${i}" class="video-preview" autoplay playsinline muted></video>
             <button type="button" class="capture-btn" onclick="snapPhoto(${i})">⚡ Capture</button>
          </div>
          
          <img id="preview-${i}" class="photo-preview">
          <canvas id="canvas-${i}" style="display:none;"></canvas>
          <button type="button" class="photo-btn" id="retake-${i}" style="display:none; width:100%; margin-top:10px; border-color:var(--danger); color:var(--danger);" onclick="resetPhoto(${i})">↩ Retake Photo</button>
          <input type="hidden" id="b64-${i}">
        </div>
      </div>
    `;
  }
  document.getElementById('forms-container').innerHTML = html;
}

function calcPrice(index) {
    const mrp = parseFloat(document.getElementById(`mrp-${index}`).value) || 0;
    const discount = parseFloat(document.getElementById(`discount-${index}`).value) || 0;
    const priceField = document.getElementById(`price-${index}`);
    if (mrp > 0) priceField.value = Math.round(mrp - (mrp * (discount / 100)));
}

function openCamera(index) {
  stopCamera();
  const video = document.getElementById(`video-${index}`);
  const container = document.getElementById(`camera-container-${index}`);
  const actions = document.getElementById(`actions-${index}`);

  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) return alert('Camera not supported.');

  navigator.mediaDevices.getUserMedia({ video: { facingMode: { ideal: 'environment' } }, audio: false })
    .then(function(stream) {
      currentStream = stream;
      video.srcObject = stream;
      video.play();
      actions.style.display = 'none';
      container.style.display = 'block';
    }).catch(function(err) { alert('Camera error: ' + err.message); });
}

function snapPhoto(index) {
  const video = document.getElementById(`video-${index}`);
  const canvas = document.getElementById(`canvas-${index}`);
  const preview = document.getElementById(`preview-${index}`);
  const container = document.getElementById(`camera-container-${index}`);
  
  let width = video.videoWidth || 640;
  let height = video.videoHeight || 480;
  if(width > 600) { height = Math.round((height * 600) / width); width = 600; }
  
  canvas.width = width; canvas.height = height;
  canvas.getContext('2d').drawImage(video, 0, 0, width, height);
  
  const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
  document.getElementById(`b64-${index}`).value = dataUrl;
  
  preview.src = dataUrl;
  preview.style.display = 'block';
  container.style.display = 'none';
  document.getElementById(`retake-${index}`).style.display = 'block';
  
  stopCamera();
}

function stopCamera() {
  if (currentStream) { currentStream.getTracks().forEach(track => track.stop()); currentStream = null; }
}

function resetPhoto(index) {
  document.getElementById(`b64-${index}`).value = "";
  document.getElementById(`preview-${index}`).style.display = 'none';
  document.getElementById(`preview-${index}`).src = "";
  document.getElementById(`retake-${index}`).style.display = 'none';
  document.getElementById(`actions-${index}`).style.display = 'flex';
  document.getElementById(`upload-${index}`).value = "";
}

function handleFileUpload(event, index) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.readAsDataURL(file);
  reader.onload = function(e) {
    const img = new Image();
    img.src = e.target.result;
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let width = img.width; let height = img.height;
      if(width > 600) { height = Math.round((height * 600) / width); width = 600; }
      canvas.width = width; canvas.height = height;
      canvas.getContext('2d').drawImage(img, 0, 0, width, height);
      
      document.getElementById(`b64-${index}`).value = canvas.toDataURL('image/jpeg', 0.6);
      document.getElementById(`preview-${index}`).src = canvas.toDataURL('image/jpeg', 0.6);
      document.getElementById(`preview-${index}`).style.display = 'block';
      document.getElementById(`actions-${index}`).style.display = 'none';
      document.getElementById(`retake-${index}`).style.display = 'block';
    }
  };
}

async function submitProducts() {
  stopCamera(); 
  const btn = document.getElementById('submit-btn');
  const productsToUpload = [];

  for (let i = 1; i <= 10; i++) {
    const name = document.getElementById(`name-${i}`).value.trim();
    if (name) {
      productsToUpload.push({
        name: name,
        mrp: document.getElementById(`mrp-${i}`).value || 0,
        discount: document.getElementById(`discount-${i}`).value || 0,
        price: document.getElementById(`price-${i}`).value || 0,
        imageBase64: document.getElementById(`b64-${i}`).value || ""
      });
    }
  }

  if (productsToUpload.length === 0) return showToast("Please fill out at least one product!");

  btn.innerText = `Uploading... Please Wait!`; btn.disabled = true;

  try {
    const res = await fetch(APPS_SCRIPT_URL, { method: 'POST', redirect: 'follow', headers: { "Content-Type": "text/plain;charset=utf-8" }, body: JSON.stringify({ action: 'uploadProducts', products: productsToUpload }) });
    const text = await res.text();
    try {
      const data = JSON.parse(text);
      if (data.success) {
        showToast("Products Uploaded Successfully!");
        setTimeout(() => {
          generateForms(); 
          window.scrollTo({ top: 0, behavior: 'smooth' }); 
          btn.innerText = "Upload Products to Shop"; btn.disabled = false;
        }, 2000); 
      } else { showToast("Error: " + data.error); btn.innerText = "Upload Products to Shop"; btn.disabled = false; }
    } catch (parseErr) { showToast("Google Script Crash!"); btn.innerText = "Upload Products to Shop"; btn.disabled = false; }
  } catch (err) { showToast("Network error."); btn.innerText = "Upload Products to Shop"; btn.disabled = false; }
}
</script>
</body>
</html>
