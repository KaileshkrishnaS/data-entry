<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>SK Products — Data Entry</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --card: #1a1a24;
      --border: #2a2a3a;
      --accent: #f97316;
      --accent2: #fb923c;
      --green: #22c55e;
      --red: #ef4444;
      --text: #f1f0ee;
      --muted: #6b7280;
      --label: #9ca3af;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Background texture ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 10% 10%, rgba(249,115,22,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 90% 90%, rgba(249,115,22,0.05) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Header ── */
    header {
      position: relative;
      z-index: 10;
      padding: 18px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,10,15,0.9);
      backdrop-filter: blur(12px);
    }

    .logo-mark {
      width: 42px; height: 42px;
      background: linear-gradient(135deg, var(--accent), #c2410c);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 18px;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 0 20px rgba(249,115,22,0.3);
    }

    .header-text h1 {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
    }

    .header-text span {
      font-size: 12px;
      color: var(--muted);
      font-weight: 400;
    }

    .header-badge {
      margin-left: auto;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.3);
      color: var(--accent);
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: 0.5px;
    }

    /* ── Main ── */
    main {
      position: relative;
      z-index: 1;
      max-width: 560px;
      margin: 0 auto;
      padding: 24px 16px 100px;
    }

    /* ── Section title ── */
    .section-label {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Product Card ── */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 12px;
      overflow: hidden;
      transition: border-color 0.2s, box-shadow 0.2s;
      animation: slideIn 0.3s ease both;
    }

    .product-card.filled {
      border-color: rgba(249,115,22,0.4);
      box-shadow: 0 0 0 1px rgba(249,115,22,0.1), 0 4px 20px rgba(0,0,0,0.3);
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Card Header ── */
    .card-header {
      display: flex;
      align-items: center;
      padding: 14px 16px;
      cursor: pointer;
      user-select: none;
      gap: 12px;
    }

    .card-num {
      width: 28px; height: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .product-card.filled .card-num {
      background: rgba(249,115,22,0.15);
      border-color: var(--accent);
      color: var(--accent);
    }

    .card-title {
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--label);
      flex: 1;
    }

    .product-card.filled .card-title {
      color: var(--text);
    }

    .card-status {
      font-size: 11px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 600;
    }

    .status-empty {
      background: rgba(107,114,128,0.15);
      color: var(--muted);
    }

    .status-ready {
      background: rgba(34,197,94,0.15);
      color: var(--green);
    }

    .chevron {
      width: 20px; height: 20px;
      color: var(--muted);
      transition: transform 0.25s;
    }

    .card-header.open .chevron {
      transform: rotate(180deg);
    }

    /* ── Card Body ── */
    .card-body {
      display: none;
      padding: 0 16px 16px;
      border-top: 1px solid var(--border);
      padding-top: 16px;
    }

    .card-body.open {
      display: block;
      animation: bodyIn 0.2s ease;
    }

    @keyframes bodyIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ── Form Fields ── */
    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--label);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    input[type="text"],
    input[type="number"] {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      padding: 11px 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      -webkit-appearance: none;
    }

    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(249,115,22,0.12);
    }

    input::placeholder { color: var(--muted); font-size: 14px; }

    /* ── Row layout ── */
    .row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .row-3 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 10px;
    }

    /* ── Image Section ── */
    .image-section {
      margin-top: 4px;
    }

    .img-options {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 10px;
    }

    .img-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 14px 10px;
      background: var(--surface);
      border: 1.5px dashed var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--muted);
      font-size: 12px;
      font-weight: 500;
      text-align: center;
    }

    .img-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: rgba(249,115,22,0.06);
    }

    .img-btn svg {
      width: 24px; height: 24px;
    }

    .img-btn input[type="file"] {
      display: none;
    }

    /* ── Image Preview ── */
    .img-preview-wrap {
      position: relative;
      border-radius: 10px;
      overflow: hidden;
      background: var(--surface);
      display: none;
    }

    .img-preview-wrap.has-image {
      display: block;
    }

    .img-preview-wrap img {
      width: 100%;
      height: 160px;
      object-fit: cover;
      display: block;
    }

    .img-preview-wrap .clear-img {
      position: absolute;
      top: 8px; right: 8px;
      width: 28px; height: 28px;
      background: rgba(0,0,0,0.7);
      border: none;
      border-radius: 50%;
      color: white;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
      transition: background 0.2s;
    }

    .img-preview-wrap .clear-img:hover {
      background: var(--red);
    }

    /* ── Price Auto ── */
    .auto-calc {
      background: rgba(249,115,22,0.08);
      border: 1px solid rgba(249,115,22,0.2);
      border-radius: 10px;
      padding: 10px 14px;
      font-size: 13px;
      color: var(--accent2);
      display: none;
      margin-top: -4px;
      margin-bottom: 14px;
    }

    .auto-calc.visible {
      display: block;
    }

    /* ── Submit Button ── */
    .submit-wrap {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 100;
      padding: 16px;
      background: linear-gradient(to top, var(--bg) 60%, transparent);
    }

    .submit-btn {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 17px 24px;
      background: linear-gradient(135deg, var(--accent), #c2410c);
      border: none;
      border-radius: 14px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(249,115,22,0.35);
    }

    .submit-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 30px rgba(249,115,22,0.45);
    }

    .submit-btn:active:not(:disabled) {
      transform: translateY(0);
    }

    .submit-btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .submit-btn .counter-badge {
      background: rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 2px 8px;
      font-size: 13px;
    }

    /* ── Progress ── */
    .progress-bar-wrap {
      width: 100%;
      height: 4px;
      background: var(--border);
      border-radius: 4px;
      margin-bottom: 16px;
      overflow: hidden;
      display: none;
    }

    .progress-bar-wrap.visible {
      display: block;
    }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      border-radius: 4px;
      width: 0%;
      transition: width 0.4s ease;
    }

    /* ── Success Overlay ── */
    .success-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(10,10,15,0.96);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
      text-align: center;
    }

    .success-overlay.show {
      display: flex;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    .success-icon {
      width: 72px; height: 72px;
      background: rgba(34,197,94,0.15);
      border: 2px solid var(--green);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 20px;
      font-size: 32px;
      animation: popIn 0.4s 0.1s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes popIn {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .success-overlay h2 {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .success-overlay p {
      color: var(--muted);
      font-size: 14px;
      line-height: 1.6;
      margin-bottom: 28px;
    }

    .success-count {
      color: var(--green);
      font-weight: 600;
    }

    .btn-done {
      padding: 14px 40px;
      background: var(--green);
      border: none;
      border-radius: 12px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-done:hover {
      background: #16a34a;
      transform: translateY(-1px);
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      z-index: 300;
      opacity: 0;
      transition: all 0.3s ease;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.error { border-color: var(--red); color: var(--red); }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── Camera overlay ── */
    .camera-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 250;
      flex-direction: column;
    }

    .camera-overlay.show {
      display: flex;
    }

    .camera-overlay video {
      flex: 1;
      width: 100%;
      object-fit: cover;
    }

    .camera-controls {
      padding: 24px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.8);
    }

    .cam-cancel {
      padding: 12px 22px;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 10px;
      color: white;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      cursor: pointer;
      font-size: 14px;
    }

    .cam-shoot {
      width: 70px; height: 70px;
      background: white;
      border: 4px solid rgba(255,255,255,0.3);
      border-radius: 50%;
      cursor: pointer;
      transition: transform 0.1s;
    }

    .cam-shoot:active {
      transform: scale(0.92);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  </style>
</head>
<body>

  <!-- Header -->
  <header>
    <div class="logo-mark">SK</div>
    <div class="header-text">
      <h1>SK Products</h1>
      <span>Data Entry Portal</span>
    </div>
    <div class="header-badge" id="readyBadge">0 / 10 Ready</div>
  </header>

  <!-- Main -->
  <main>
    <div class="section-label">Product Details</div>

    <!-- Progress Bar -->
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- 10 Product Cards -->
    <div id="productList"></div>
  </main>

  <!-- Submit Button -->
  <div class="submit-wrap">
    <button class="submit-btn" id="submitBtn" onclick="submitAll()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
      Save to Sheet
      <span class="counter-badge" id="readyCounter">0 products</span>
    </button>
  </div>

  <!-- Camera Overlay -->
  <div class="camera-overlay" id="cameraOverlay">
    <video id="cameraFeed" autoplay playsinline muted></video>
    <canvas id="captureCanvas" style="display:none;"></canvas>
    <div class="camera-controls">
      <button class="cam-cancel" onclick="closeCamera()">Cancel</button>
      <button class="cam-shoot" onclick="capturePhoto()" title="Take Photo"></button>
      <div style="width:80px;"></div>
    </div>
  </div>

  <!-- Success Overlay -->
  <div class="success-overlay" id="successOverlay">
    <div class="success-icon">✓</div>
    <h2>Products Saved!</h2>
    <p id="successMsg">All products have been<br/>uploaded successfully.</p>
    <button class="btn-done" onclick="resetAll()">Add More Products</button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>
    // ── CONFIG ──
    // Paste the Apps Script Web App URL here (same URL as your other sites)
    const SCRIPT_URL = 'YOUR_APPS_SCRIPT_URL_HERE';

    // ── State ──
    const products = Array.from({ length: 10 }, (_, i) => ({
      id: i + 1,
      name: '', mrp: '', discount: '', price: '',
      imageBase64: '', imageFile: null,
      open: i === 0
    }));

    let activeCameraIndex = -1;
    let cameraStream = null;

    // ── Render ──
    function render() {
      const list = document.getElementById('productList');
      list.innerHTML = '';
      products.forEach((p, i) => {
        const filled = p.name.trim() !== '';
        const hasImg = p.imageBase64 !== '';
        const card = document.createElement('div');
        card.className = `product-card ${filled ? 'filled' : ''}`;
        card.id = `card-${i}`;

        card.innerHTML = `
          <div class="card-header ${p.open ? 'open' : ''}" onclick="toggleCard(${i})">
            <div class="card-num">${i + 1}</div>
            <div class="card-title">${filled ? p.name : `Product ${i + 1}`}</div>
            <span class="card-status ${filled ? 'status-ready' : 'status-empty'}">
              ${filled ? '● Ready' : '○ Empty'}
            </span>
            <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
              <path d="M6 9l6 6 6-6"/>
            </svg>
          </div>
          <div class="card-body ${p.open ? 'open' : ''}">

            <div class="field">
              <label>Product Name *</label>
              <input type="text" placeholder="e.g. Fresh Tomatoes 1kg" value="${escHtml(p.name)}"
                oninput="setField(${i}, 'name', this.value)" autocomplete="off" />
            </div>

            <div class="row-3">
              <div class="field">
                <label>MRP (₹)</label>
                <input type="number" placeholder="0" value="${p.mrp}"
                  oninput="setField(${i}, 'mrp', this.value); calcPrice(${i})" />
              </div>
              <div class="field">
                <label>Discount %</label>
                <input type="number" placeholder="0" value="${p.discount}"
                  oninput="setField(${i}, 'discount', this.value); calcPrice(${i})" min="0" max="100" />
              </div>
              <div class="field">
                <label>Price (₹)</label>
                <input type="number" placeholder="0" value="${p.price}"
                  id="price-${i}" oninput="setField(${i}, 'price', this.value)" />
              </div>
            </div>

            <div class="auto-calc ${(p.mrp && p.discount) ? 'visible' : ''}" id="autocalc-${i}">
              Auto price: ₹${calcAutoPrice(p.mrp, p.discount)}
            </div>

            <div class="field image-section">
              <label>Product Image</label>
              <div class="img-options">
                <label class="img-btn" onclick="openCamera(${i})">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/>
                    <circle cx="12" cy="13" r="4"/>
                  </svg>
                  📷 Take Photo
                </label>
                <label class="img-btn">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
                  </svg>
                  📁 Upload File
                  <input type="file" accept="image/*" onchange="handleUpload(${i}, this)" />
                </label>
              </div>
              <div class="img-preview-wrap ${hasImg ? 'has-image' : ''}" id="preview-${i}">
                <img src="${p.imageBase64 || ''}" alt="preview" />
                <button class="clear-img" onclick="clearImage(${i})">✕</button>
              </div>
            </div>

          </div>
        `;
        list.appendChild(card);
      });

      updateCounter();
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function toggleCard(i) {
      products[i].open = !products[i].open;
      render();
    }

    function setField(i, field, val) {
      products[i][field] = val;
      // Live update card title and status without full re-render
      const card = document.getElementById(`card-${i}`);
      if (card) {
        const filled = products[i].name.trim() !== '';
        card.className = `product-card ${filled ? 'filled' : ''}`;
      }
      updateCounter();
    }

    function calcAutoPrice(mrp, disc) {
      const m = parseFloat(mrp) || 0;
      const d = parseFloat(disc) || 0;
      return Math.round(m - (m * d / 100));
    }

    function calcPrice(i) {
      const p = products[i];
      const auto = calcAutoPrice(p.mrp, p.discount);
      const ac = document.getElementById(`autocalc-${i}`);
      const pi = document.getElementById(`price-${i}`);
      if (p.mrp && p.discount) {
        if (ac) { ac.textContent = `Auto price: ₹${auto}`; ac.classList.add('visible'); }
        if (pi && !products[i].price) { pi.value = auto; products[i].price = auto; }
      } else {
        if (ac) ac.classList.remove('visible');
      }
    }

    function updateCounter() {
      const ready = products.filter(p => p.name.trim() !== '').length;
      document.getElementById('readyBadge').textContent = `${ready} / 10 Ready`;
      document.getElementById('readyCounter').textContent = `${ready} product${ready !== 1 ? 's' : ''}`;
    }

    // ── Image Handling ──
    function handleUpload(i, input) {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        products[i].imageBase64 = e.target.result;
        const wrap = document.getElementById(`preview-${i}`);
        if (wrap) {
          wrap.querySelector('img').src = e.target.result;
          wrap.classList.add('has-image');
        }
      };
      reader.readAsDataURL(file);
    }

    function clearImage(i) {
      products[i].imageBase64 = '';
      const wrap = document.getElementById(`preview-${i}`);
      if (wrap) { wrap.classList.remove('has-image'); wrap.querySelector('img').src = ''; }
    }

    // ── Camera ──
    async function openCamera(i) {
      activeCameraIndex = i;
      try {
        cameraStream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: { ideal: 'environment' }, width: { ideal: 1920 }, height: { ideal: 1080 } },
          audio: false
        });
        const video = document.getElementById('cameraFeed');
        video.srcObject = cameraStream;
        document.getElementById('cameraOverlay').classList.add('show');
      } catch (err) {
        showToast('Camera access denied. Please use Upload instead.', 'error');
      }
    }

    function closeCamera() {
      if (cameraStream) { cameraStream.getTracks().forEach(t => t.stop()); cameraStream = null; }
      document.getElementById('cameraOverlay').classList.remove('show');
      activeCameraIndex = -1;
    }

    function capturePhoto() {
      const video = document.getElementById('cameraFeed');
      const canvas = document.getElementById('captureCanvas');
      canvas.width = video.videoWidth;
      canvas.height = video.videoHeight;
      canvas.getContext('2d').drawImage(video, 0, 0);
      const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
      if (activeCameraIndex >= 0) {
        products[activeCameraIndex].imageBase64 = dataUrl;
        const wrap = document.getElementById(`preview-${activeCameraIndex}`);
        if (wrap) {
          wrap.querySelector('img').src = dataUrl;
          wrap.classList.add('has-image');
        }
      }
      closeCamera();
      showToast('Photo captured! ✓');
    }

    // ── Submit ──
    async function submitAll() {
      const filled = products.filter(p => p.name.trim() !== '');
      if (filled.length === 0) {
        showToast('Please fill at least 1 product name.', 'error');
        return;
      }

      if (SCRIPT_URL === 'YOUR_APPS_SCRIPT_URL_HERE') {
        showToast('⚠ Please set your Script URL in the code.', 'error');
        return;
      }

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = `<svg class="spin" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Uploading...`;

      const progressWrap = document.getElementById('progressWrap');
      const progressBar  = document.getElementById('progressBar');
      progressWrap.classList.add('visible');
      progressBar.style.width = '10%';

      const payload = filled.map(p => ({
        name: p.name.trim(),
        mrp: parseFloat(p.mrp) || 0,
        discount: parseFloat(p.discount) || 0,
        price: parseFloat(p.price) || 0,
        imageBase64: p.imageBase64 || ''
      }));

      progressBar.style.width = '40%';

      try {
        const res = await fetch(SCRIPT_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain' },
          body: JSON.stringify({ action: 'uploadProducts', products: payload })
        });

        progressBar.style.width = '80%';
        const result = await res.json();
        progressBar.style.width = '100%';

        if (result.success) {
          setTimeout(() => {
            progressWrap.classList.remove('visible');
            document.getElementById('successMsg').innerHTML =
              `<span class="success-count">${filled.length} product${filled.length > 1 ? 's' : ''}</span> saved to your Google Sheet<br/>& images uploaded to Drive!`;
            document.getElementById('successOverlay').classList.add('show');
          }, 400);
        } else {
          throw new Error(result.error || 'Unknown error');
        }
      } catch (err) {
        progressBar.style.width = '0%';
        progressWrap.classList.remove('visible');
        showToast('Error: ' + err.message, 'error');
        btn.disabled = false;
        btn.innerHTML = `<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg> Save to Sheet <span class="counter-badge" id="readyCounter">${filled.length} products</span>`;
      }
    }

    function resetAll() {
      products.forEach((p, i) => {
        p.name = ''; p.mrp = ''; p.discount = ''; p.price = '';
        p.imageBase64 = ''; p.open = i === 0;
      });
      document.getElementById('successOverlay').classList.remove('show');
      document.getElementById('submitBtn').disabled = false;
      document.getElementById('submitBtn').innerHTML = `
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
        Save to Sheet
        <span class="counter-badge" id="readyCounter">0 products</span>`;
      render();
    }

    // ── Toast ──
    function showToast(msg, type = '') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `toast ${type} show`;
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    // ── Spinner CSS ──
    const style = document.createElement('style');
    style.textContent = `.spin { animation: spin 0.8s linear infinite; } @keyframes spin { to { transform: rotate(360deg); } }`;
    document.head.appendChild(style);

    // ── Init ──
    render();
  </script>
</body>
</html>
